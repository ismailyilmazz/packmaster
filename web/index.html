<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PackMaster Pro - 3D Optimizasyon Paneli</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📦</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1><i class="fas fa-cubes"></i> PackMaster</h1>
        <div class="version">v1.0 | Optimizasyon Teknikleri Projesi</div>
    </header>

    <div class="main-container">
        
        <aside class="control-panel">
            
            <div class="card">
                <div id="status" class="loading">
                    <i class="fas fa-spinner"></i>
                    <span>Motor yükleniyor...</span>
                </div>
                <button id="run-btn" disabled>
                    <i class="fas fa-play"></i> Optimizasyonu Çalıştır
                </button>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="fas fa-truck-ramp-box"></i> Koli Tanımla
                </div>
                <div class="input-group">
                    <label>Koli Adı</label>
                    <input type="text" id="boxName" value="Standart_Koli">
                </div>
                <div class="input-group">
                    <label>Boyutlar (En x Boy x Yükseklik) cm</label>
                    <div class="input-row">
                        <input type="number" id="boxW" value="50" placeholder="W">
                        <input type="number" id="boxL" value="50" placeholder="L">
                        <input type="number" id="boxH" value="50" placeholder="H">
                    </div>
                </div>
                <div class="input-group">
                    <label>Maksimum Taşıma Kapasitesi (kg)</label>
                    <input type="number" id="boxM" value="20">
                </div>
                <button type="button" class="btn-secondary" id="add-box-btn"><i class="fas fa-plus"></i> Koli Şablonunu Ekle</button>
                
                <div class="dynamic-list" id="added-boxes-list"></div>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="fas fa-box-open"></i> Ürün Ekle
                </div>
                <div class="input-group">
                    <label>Boyutlar (En x Boy x Yükseklik) cm</label>
                    <div class="input-row">
                        <input type="number" id="itemW" value="10" placeholder="W">
                        <input type="number" id="itemL" value="15" placeholder="L">
                        <input type="number" id="itemH" value="10" placeholder="H">
                    </div>
                </div>
                <div class="input-group">
                    <label>Ağırlık (kg)</label>
                    <input type="number" id="itemWeight" value="2">
                </div>
                <div class="switch-group">
                    <label for="itemFragile"><i class="fas fa-glass-fragile" style="color: #e74c3c"></i> Kırılgan Eşya?</label>
                    <label class="switch">
                        <input type="checkbox" id="itemFragile">
                        <span class="slider"></span>
                    </label>
                </div>
                <button type="button" class="btn-secondary" id="add-item-btn"><i class="fas fa-plus"></i> Ürünü Listeye Ekle</button>
                
                <div class="dynamic-list" id="added-items-list"></div>
            </div>

        </aside>

        <main class="result-panel">
            
            <div class="card" id="results-summary-card" style="display: none;">
                <div class="card-header"><i class="fas fa-chart-line"></i> Hesaplama Özeti (FFD Algoritması)</div>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-value" id="metric-boxes">0</div>
                        <div class="metric-label">Kullanılan Koli</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="metric-items">0</div>
                        <div class="metric-label">Yerleşen Ürün</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value" id="metric-time">0</div>
                        <div class="metric-label">Süre (ms)</div>
                    </div>
                </div>
            </div>
            
            <div class="card">
                <div class="card-header"><i class="fas fa-brain"></i> Optimizasyon Algoritması Seçimi</div>
                <div class="input-group">
                    <label for="algo-select-dropdown" style="font-weight: bold; color: var(--accent);">Görselleştirilecek Modeli Değiştirin:</label>
                    <select id="algo-select-dropdown" style="padding: 10px; width: 100%; border-radius: 4px; border: 1px solid #ddd; font-size: 14px; background: #fff; cursor: pointer;">
                        <option value="FFD">First-Fit Decreasing (FFD) - Heuristic Baseline</option>
                        <option value="GWO">Grey Wolf Optimizer (GWO) - Metaheuristic</option>
                        <option value="WOA">Whale Optimization Algorithm (WOA) - Metaheuristic</option>
                        <option value="HHO">Harris Hawks Optimization (HHO) - Metaheuristic</option>
                        <option value="SSA">Salp Swarm Algorithm (SSA) - Metaheuristic</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <i class="fas fa-vr-cardboard"></i> 3D Yerleşim Planı
                </div>
                <div class="input-group" id="koli-secici-alan" style="display: none; margin-bottom: 15px;">
                    <label for="box-select-dropdown" style="font-weight: bold; color: var(--accent);">
                        <i class="fas fa-boxes"></i> Gösterilecek Koli Seçin:
                    </label>
                    <select id="box-select-dropdown" style="padding: 10px; width: 100%; border-radius: 4px; border: 1px solid #ddd; font-size: 14px; background: #fff; cursor: pointer;">
                        </select>
                </div>
                <div id="cizim-alani"></div>
                
                <details>
                    <summary><i class="fas fa-code"></i> Ham Python Çıktısı (JSON)</summary>
                    <pre id="output">Henüz hesaplama yapılmadı.</pre>
                </details>
            </div>

        </main>
    </div>

    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
